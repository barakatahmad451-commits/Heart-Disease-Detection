<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Disease Detection AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <style>
      :root {
        --bg-color: #121824;
        --box-bg: #1e2640;
        --text-primary: #e0e6ed;
        --primary: #ff4b2b;
        --primary-end: #ff416c;
        --border-radius: 20px;
      }

      body {
        background: radial-gradient(circle at top left, #2b101d, #121824 40%);
        background-color: var(--bg-color);
        color: var(--text-primary);
        font-family: "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .main-container {
        width: 100%;
        max-width: 900px;
      }

      .heart-icon {
        font-size: 5rem;
        background: linear-gradient(to right, #ff416c, #ff4b2b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
      }

      h1 {
        margin-top: 0;
        font-size: 2.5rem;
        text-align: center;
        font-weight: 700;
        color: #fff;
      }
      h1 span {
        font-weight: 400;
        font-size: 1.1rem;
        display: block;
        margin-top: 10px;
        color: #a0aab8;
      }

      .icon-bar {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 35px;
      }
      .icon-item {
        color: #a0aab8;
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 8px 18px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .icon-item i {
        color: #ff416c;
      }

      .patient-data-container {
        background: rgba(30, 38, 64, 0.4);
        padding: 35px;
        border-radius: var(--border-radius);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        margin-bottom: 25px;
      }

      .data-header {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.4rem;
        color: #fff;
        margin-bottom: 30px;
        font-weight: 600;
      }
      .data-header i {
        color: #ff416c;
      }

      /* Asli 3-Column Grid Jo Aapne Banaya Tha */
      .form-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 25px;
      }

      @media (max-width: 768px) {
        .form-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 480px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
      }

      .form-group {
        display: flex;
        flex-direction: column;
      }
      .label-text {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #a0aab8;
        margin-bottom: 8px;
        font-size: 0.9rem;
        font-weight: 600;
      }
      .label-text i {
        color: #00b4db;
      }

      input,
      select {
        width: 100%;
        padding: 14px 16px;
        background: rgba(18, 24, 36, 0.6);
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 0.95rem;
        transition: all 0.3s;
        box-sizing: border-box;
      }
      input:focus,
      select:focus {
        outline: none;
        border-color: #ff416c;
        background: rgba(18, 24, 36, 0.8);
        box-shadow: 0 0 15px rgba(2ff, 65, 108, 0.15);
      }
      input::placeholder {
        color: #52637a;
      }
      select option {
        background: #1e2640;
        color: #fff;
      }

      .submit-btn {
        width: 100%;
        padding: 16px;
        border: none;
        background: linear-gradient(to right, #ff416c, #ff4b2b);
        color: white;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .submit-btn:hover {
        opacity: 0.9;
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 65, 108, 0.4);
      }

      /* Results Display Card - Matches your precise layout */
      .results-container {
        display: none; /* Hidden until form submit */
        background: rgba(30, 38, 64, 0.4);
        padding: 30px;
        border-radius: var(--border-radius);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        margin-top: 25px;
      }

      .results-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 30px;
        text-align: left;
      }

      @media (max-width: 550px) {
        .results-inner {
          flex-direction: column;
          text-align: center;
          gap: 15px;
        }
      }

      .icon-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.2rem;
        color: white;
        flex-shrink: 0;
      }
      .icon-circle.danger {
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        box-shadow: 0 0 20px rgba(255, 65, 108, 0.4);
      }
      .icon-circle.success {
        background: linear-gradient(135deg, #2ecc71, #27ae60);
        box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
      }

      .results-text-side {
        flex-grow: 1;
      }
      .prediction-result {
        font-size: 2.2rem;
        margin: 0 0 8px 0;
        font-weight: 700;
        color: #fff;
      }
      .metrics-box {
        color: #a0aab8;
        font-size: 1rem;
        line-height: 1.5;
      }
      .metrics-box strong {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <center><i class="fa fa-heartbeat heart-icon"></i></center>
      <h1>
        Heart Disease Detection AI
        <span
          >Smart AI system that checks heart health risk using patient medical
          data.</span
        >
      </h1>

      <div class="icon-bar">
        <div class="icon-item"><i class="fa fa-scroll"></i> AI Powered</div>
        <div class="icon-item">
          <i class="fa fa-heartbeat"></i> Heart Risk Analysis
        </div>
        <div class="icon-item">
          <i class="fa fa-shipping-fast"></i> Fast & Secure
        </div>
      </div>

      <form id="heartForm">
        <div class="patient-data-container">
          <div class="data-header">
            <i class="fa fa-id-badge"></i> Patient Information
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-user"></i> Your Age</label
              >
              <input
                type="number"
                id="age"
                required
                placeholder="Enter your age"
              />
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-venus-mars"></i> Gender</label
              >
              <select id="gender" required>
                <option value="" disabled selected>Select gender</option>
                <option value="1">Male</option>
                <option value="0">Female</option>
              </select>
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-stethoscope"></i> Chest Pain Type</label
              >
              <select id="cp" required>
                <option value="" disabled selected>Select chest pain</option>
                <option value="3">Typical Chest Pain</option>
                <option value="2">Mild Chest Pain</option>
                <option value="1">Non-Heart Chest Pain</option>
                <option value="0">No Chest Pain</option>
              </select>
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-wave-square"></i> Blood Pressure</label
              >
              <input
                type="number"
                id="trestbps"
                required
                placeholder="Enter blood pressure"
              />
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-vial"></i> Cholesterol Level</label
              >
              <input
                type="number"
                id="chol"
                required
                placeholder="Enter cholesterol level"
              />
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-prescription-bottle-alt"></i> Blood
                Sugar</label
              >
              <select id="fbs" required>
                <option value="" disabled selected>Select blood sugar</option>
                <option value="0">Normal</option>
                <option value="1">High</option>
              </select>
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-heartbeat"></i> Maximum Heart Rate</label
              >
              <input
                type="number"
                id="thalach"
                required
                placeholder="Enter max heart rate"
              />
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-running"></i> Chest Pain During Exercise</label
              >
              <select id="exang" required>
                <option value="" disabled selected>Select option</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
              </select>
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-heartbeat"></i> Heart Stress Level</label
              >
              <input
                type="number"
                id="oldpeak"
                step="0.1"
                required
                placeholder="Enter stress value"
              />
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-book-medical"></i> ECG Result</label
              >
              <select id="restecg" required>
                <option value="" disabled selected>Select ECG result</option>
                <option value="0">Normal</option>
                <option value="1">Abnormal</option>
                <option value="2">Serious Condition</option>
              </select>
            </div>

            <div class="form-group">
              <label class="label-text"
                ><i class="fa fa-chart-line"></i> Heart Activity Pattern</label
              >
              <select id="slope" required>
                <option value="" disabled selected>
                  Select activity pattern
                </option>
                <option value="2">Downward</option>
                <option value="1">Flat</option>
                <option value="0">Upward</option>
              </select>
            </div>
          </div>
          <button type="submit" class="submit-btn">
            <i class="fa fa-paper-plane"></i> Analyze Heart Health
          </button>
        </div>
      </form>

      <div id="resultsBlock" class="results-container">
        <div class="results-inner">
          <div id="resultCircle" class="icon-circle">
            <i id="resultIcon"></i>
          </div>
          <div class="results-text-side">
            <h1 id="predictionStatus" class="prediction-result"></h1>
            <div class="metrics-box">
              Confidence Score: <strong id="confidenceValue"></strong>%<br />
              Risk Score: <strong id="riskValue"></strong>/100
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
